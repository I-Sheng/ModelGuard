services:
  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # Stores: model artifacts, audit logs, attack reports
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: modelguard-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO Init — one-shot bucket creation using MinIO Client (mc)
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: modelguard-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/modelguard-models &&
        mc mb --ignore-existing local/modelguard-auditlog &&
        mc mb --ignore-existing local/modelguard-reports &&
        echo 'Buckets ready.'
      "

  # ---------------------------------------------------------------------------
  # Backend — FastAPI anomaly detection engine (Isolation Forest)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: modelguard-backend
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app   # hot-reload in dev

  # ---------------------------------------------------------------------------
  # Frontend — SwaggerAI (nginx serving Swagger UI)
  # Provides an OpenAPI-driven interactive UI for model queries and registration
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: modelguard-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  # ---------------------------------------------------------------------------
  # OE Dashboard — Operations/Engineering monitoring (Streamlit)
  # Internal tool for health checks, audit logs, and attack report review
  # ---------------------------------------------------------------------------
  oe-dashboard:
    build:
      context: ./oe-dashboard
      dockerfile: Dockerfile
    container_name: modelguard-oe-dashboard
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      OE_ADMIN_USER: admin
      OE_ADMIN_PASSWORD: admin_password
    ports:
      - "8501:8501"
    volumes:
      - ./oe-dashboard:/app   # hot-reload in dev

volumes:
  minio_data:
    driver: local
