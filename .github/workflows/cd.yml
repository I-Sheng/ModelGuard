name: CD

on:
  push:
    branches: [main]

# GITHUB_TOKEN needs write access to push images to GHCR.
permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Build all three custom Docker images and push to GitHub Container Registry.
  # Images are tagged with both :latest and the commit SHA for pinned deploys.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./api
          - service: frontend
            context: ./frontend
          - service: oe-dashboard
            context: ./oe-dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/modelguard-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/modelguard-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
