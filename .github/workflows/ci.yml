name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: TypeScript type check — fast, no services needed
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: tests
      - name: tsc --noEmit
        run: bunx tsc --noEmit
        working-directory: tests

  # ---------------------------------------------------------------------------
  # Job 2: Unit tests — pure logic, no HTTP, no Docker
  # ---------------------------------------------------------------------------
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: tests
      - name: Run unit tests
        run: bunx jest unit.test.ts
        working-directory: tests

  # ---------------------------------------------------------------------------
  # Job 3: Integration tests — full Docker Compose stack
  # Requires these GitHub repository secrets to be configured:
  #   MINIO_ROOT_USER, MINIO_ROOT_PASSWORD, MINIO_ACCESS_KEY, MINIO_SECRET_KEY
  #   JWT_SECRET_KEY, OE_ADMIN_USER, OE_ADMIN_PASSWORD
  #   ANALYST1_PASSWORD, PARTNER1_PASSWORD, ADMIN_PASSWORD
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          cat > .env <<EOF
          MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
          MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          OE_ADMIN_USER=${{ secrets.OE_ADMIN_USER }}
          OE_ADMIN_PASSWORD=${{ secrets.OE_ADMIN_PASSWORD }}
          ANALYST1=analyst1
          ANALYST1_PASSWORD=${{ secrets.ANALYST1_PASSWORD }}
          PARTNER1=partner1
          PARTNER1_PASSWORD=${{ secrets.PARTNER1_PASSWORD }}
          ADMIN_USER=admin
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          EOF

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 24); do
            curl -sf http://localhost:8000/health && echo "Backend ready." && break
            echo "Waiting... ($i/24)"
            sleep 5
          done

      - uses: oven-sh/setup-bun@v2
      - name: Install test dependencies
        run: bun install
        working-directory: tests

      - name: Run functional tests
        run: bunx jest functional.test.ts
        working-directory: tests

      - name: Run security tests
        run: bunx jest security.test.ts
        working-directory: tests

      - name: Dump backend logs
        if: failure()
        run: docker compose logs backend

      - name: Tear down
        if: always()
        run: docker compose down -v
